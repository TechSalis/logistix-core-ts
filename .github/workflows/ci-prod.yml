name: Deploy Core (Production)
run-name: Deploy (Production) (${{ github.ref_name }})  - ${{ github.event.head_commit.message || github.event.pull_request.title || inputs.commit_message || github.sha }} by @${{ github.actor }}

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  test-and-migrate:
    name: Test & Migrate (Production)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Run Drizzle Migrations (Production)
        if: github.event_name == 'push'
        env:
          DATABASE_URL: ${{ secrets.PROD_DIRECT_URL }}
        run: npx tsx scripts/migrate.ts
