name: Deploy Core (Production)
run-name: Deploy (Production) (${{ github.ref_name }})  - ${{ github.event.head_commit.message || github.event.pull_request.title || inputs.commit_message || github.sha }} by @${{ github.actor }}

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      commit_message:
        description: "Commit message or description for manual runs"
        required: false
        default: "Manual Dispatch"

jobs:
  test-and-migrate:
    name: Test & Migrate (Production)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Run Drizzle Migrations (Production)
        env:
          DATABASE_URL: ${{ secrets.PROD_DIRECT_URL }}
        run: npx tsx scripts/migrate.ts
